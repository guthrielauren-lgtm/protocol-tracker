<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="navyBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2a"/>
      <stop offset="100%" style="stop-color:#1a2d45"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5c842"/>
      <stop offset="100%" style="stop-color:#f5a623"/>
    </linearGradient>
    <linearGradient id="emeraldGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2ec4b6"/>
      <stop offset="100%" style="stop-color:#3dd68c"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="roundRect">
      <rect width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#navyBg)"/>

  <!-- Subtle grid texture -->
  <g opacity="0.06" clip-path="url(#roundRect)">
    <line x1="0" y1="128" x2="512" y2="128" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="256" x2="512" y2="256" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="384" x2="512" y2="384" stroke="#ffffff" stroke-width="1"/>
    <line x1="128" y1="0" x2="128" y2="512" stroke="#ffffff" stroke-width="1"/>
    <line x1="256" y1="0" x2="256" y2="512" stroke="#ffffff" stroke-width="1"/>
    <line x1="384" y1="0" x2="384" y2="512" stroke="#ffffff" stroke-width="1"/>
  </g>

  <!-- AMBER triangle pointing UP — muscle/lean mass gain -->
  <!-- Vertices: top-center, bottom-left, bottom-right — shifted slightly up and left -->
  <polygon
    points="232,108  96,330  368,330"
    fill="url(#amberGrad)"
    opacity="0.92"
    filter="url(#glow)"
  />

  <!-- EMERALD triangle pointing DOWN — fat reduction -->
  <!-- Vertices: top-left, top-right, bottom-center — shifted slightly down and right -->
  <polygon
    points="144,192  416,192  280,414"
    fill="url(#emeraldGrad)"
    opacity="0.85"
    filter="url(#glow)"
  />

  <!-- Intersection overlay — glowing center diamond where they overlap -->
  <!-- Computed intersection is roughly a diamond/rhombus shape -->
  <polygon
    points="232,192  368,192  280,330  144,330"
    fill="#ffffff"
    opacity="0.08"
  />

  <!-- Central dot — the protocol focal point -->
  <circle cx="256" cy="261" r="18" fill="#ffffff" opacity="0.95" filter="url(#softglow)"/>
  <circle cx="256" cy="261" r="10" fill="url(#amberGrad)"/>

  <!-- Top vertex accent dot -->
  <circle cx="232" cy="108" r="7" fill="#f5c842" opacity="0.9"/>

  <!-- Bottom vertex accent dot -->
  <circle cx="280" cy="414" r="7" fill="#3dd68c" opacity="0.9"/>

  <!-- Thin border ring -->
  <rect width="512" height="512" rx="112" ry="112" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="3"/>
</svg>
